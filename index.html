<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>引き寄せの法則 - アプリ開発者ページ</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a0533 0%, #2d1b69 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .icon { font-size: 72px; margin-bottom: 16px; }
    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #f9d423, #e040fb);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .tagline {
      font-size: 15px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 100px;
      padding: 6px 18px;
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      margin: 4px;
    }
    .badges { margin-bottom: 32px; }
    .play-btn {
      display: inline-block;
      background: linear-gradient(135deg, #f9d423, #e040fb);
      color: #1a0533;
      font-weight: 700;
      font-size: 15px;
      padding: 14px 32px;
      border-radius: 100px;
      text-decoration: none;
      margin-bottom: 24px;
    }
    .contact {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-top: 24px;
    }
    .contact a { color: rgba(255,255,255,0.65); }
    footer {
      margin-top: 32px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✨</div>
    <h1>引き寄せの法則</h1>
    <p class="tagline">
      毎日の感謝・アファメーション・ビジョンボードで<br>
      夢を現実に引き寄せるアプリ
    </p>
    <div class="badges">
      <span class="badge">🙏 感謝日記</span>
      <span class="badge">💫 アファメーション</span>
      <span class="badge">🎯 ビジョンボード</span>
      <span class="badge">📅 カレンダー</span>
    </div>
    <a class="play-btn" href="https://play.google.com/store/apps" target="_blank">
      Google Play でダウンロード
    </a>
    <div class="contact">
      お問い合わせ・プライバシーポリシーについては<br>
      <a href="mailto:support@example.com">support@example.com</a> までご連絡ください。
    </div>
  </div>
  <footer>© 2026 引き寄せの法則 App. All rights reserved.</footer>
</body>
</html>
